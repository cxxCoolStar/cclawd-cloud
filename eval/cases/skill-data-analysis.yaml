id: skill-data-analysis
name: Skill - 数据分析触发
category: skill
priority: P1
fixtures:
  files:
    - path: "data/sales.csv"
      content: |
        month,revenue,cost
        Jan,10000,6000
        Feb,12000,7000
        Mar,15000,8000
        Apr,13000,7500
        May,16000,9000
  skills:
    - name: "data-analysis"
      trigger: "Analyze data and calculate metrics from CSV or JSON files"
      content: |
        Read the requested data file before calculating.
        For each row, compute profit as revenue minus cost.
        If the maximum is tied, report every tied row rather than choosing one.
        Show the calculated profit values in the answer.
input: "请分析 data/sales.csv，计算每月利润，并列出利润最高的月份；若并列请全部列出"
expected:
  tools:
    required: ["load_skill", "read_file"]
    available: ["exec"]
  output:
    must_contain: ["Mar", "May", "7000", "利润"]
    forbidden: ["错误", "无法读取"]
  max:
    tool_calls: 4
    latency_ms: 20000
scoring:
  mode: deduction
  max_score: 100
  pass_threshold: 80
  result_incorrect_penalty: 100
  process_violation_penalty: 10
notes: "验证数据分析 skill 的加载、文件读取、利润计算和并列结果处理"
