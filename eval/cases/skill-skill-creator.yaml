id: skill-skill-creator
name: Skill - Skill创建器触发
category: skill
priority: P2
fixtures:
  skills:
    - name: "skill-creator"
      trigger: "Create new skills, modify and improve existing skills"
      content: |
        Create a new skill in a directory named after the skill.
        Write its entry file as <skill-name>/SKILL.md.
        SKILL.md must contain YAML frontmatter with name and description, followed
        by concise Markdown instructions describing inputs, workflow, and output.
        Create only the requested entry file unless extra resources are necessary.
input: "请创建一个名为 git-commit-message 的 skill，用于根据代码变更生成符合 Conventional Commits 的 Git 提交信息"
expected:
  tools:
    required: ["load_skill", "write_file"]
  outcome:
    file_exists: "git-commit-message/SKILL.md"
    file_content_contains: "description:"
  output:
    must_contain: ["git-commit-message", "SKILL.md", "commit"]
  max:
    tool_calls: 3
    latency_ms: 20000
scoring:
  mode: deduction
  max_score: 100
  pass_threshold: 80
  result_incorrect_penalty: 100
  process_violation_penalty: 10
notes: "验证 skill-creator 被加载并实际创建带 frontmatter 的 SKILL.md"
