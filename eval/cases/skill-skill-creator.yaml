id: skill-skill-creator
name: Skill - Skill创建器触发
category: skill
priority: P2
fixtures:
  skills:
    - name: "skill-creator"
      trigger: "Create new skills, modify and improve existing skills"
input: "请帮我创建一个 skill，用于生成 Git 提交信息，要求根据代码变更自动生成符合规范的 commit message"
expected:
  tools:
    required: ["write_file"]
  output:
    must_contain: ["skill", "SKILL.md", "commit", "git"]
  max:
    tool_calls: 5
    latency_ms: 30000
scoring:
  mode: deduction
  max_score: 100
  pass_threshold: 80
  result_incorrect_penalty: 100
  process_violation_penalty: 10
notes: "测试 skill-creator skill 触发后创建新 skill 文件的能力，应生成包含 frontmatter 的 SKILL.md"
