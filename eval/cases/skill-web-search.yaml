id: skill-web-search
name: Skill - 网页搜索触发
category: skill
priority: P1
fixtures:
  skills:
    - name: "web-search"
      trigger: "Search the web and fetch web pages"
input: "请搜索一下 OpenAI 的最新动态"
expected:
  tools:
    required: ["web_search"]
  output:
    must_contain: ["OpenAI"]
    forbidden: ["抱歉", "无法搜索"]
  max:
    tool_calls: 3
    latency_ms: 30000
scoring:
  mode: deduction
  max_score: 100
  pass_threshold: 80
  result_incorrect_penalty: 100
  process_violation_penalty: 10
notes: "测试 web-search skill 触发后使用 web_search 工具进行搜索的能力"
