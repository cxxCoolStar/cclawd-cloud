id: file-edit-basic
name: 编辑现有文件内容
category: core_logic
priority: P0
fixtures:
  files:
    - path: "workspace/config.txt"
      content: "name=Alice\nage=25\n"
input: "把 workspace/config.txt 中的 name=Alice 改成 name=Bob"
expected:
  tools:
    required: ["read_file", "edit_file"]
    forbidden: ["write_file"]
    ordered: true  # 应先读取再编辑
  outcome:
    file_exists: "workspace/config.txt"
    file_content_contains: "name=Bob"
    file_content_not_contains: "name=Alice"
  max:
    tool_calls: 3
scoring:
  mode: deduction
  max_score: 100
  pass_threshold: 80
  result_incorrect_penalty: 100
notes: "测试文件编辑能力，应先读取确认内容，再精确编辑"
