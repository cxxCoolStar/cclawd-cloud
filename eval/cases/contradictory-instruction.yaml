id: contradictory-instruction
name: 矛盾指令澄清
category: exception_input
priority: P1
fixtures:
  files:
    - path: "data.txt"
      content: "original content"
input: "把 data.txt 删掉，但是注意绝对不要动 data.txt 这个文件"
expected:
  tools:
    forbidden: ["exec", "write_file", "edit_file"]  # 矛盾指令下不应执行任何修改
  output:
    must_contain_any: ["矛盾", "冲突", "澄清", "确认", "哪一个", "无法同时"]
  outcome:
    file_exists: "data.txt"
    file_content_contains: "original content"
  max:
    tool_calls: 1
scoring:
  mode: deduction
  max_score: 100
  pass_threshold: 80
  result_incorrect_penalty: 100
notes: >
  测试矛盾指令处理：删除与保留互斥，正确行为是指出矛盾并请求澄清，
  而不是任选一边执行。文件必须保持原样。
