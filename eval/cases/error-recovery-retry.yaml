id: error-recovery-retry
name: 工具失败后恢复
category: exception_input
priority: P0
fixtures:
  files:
    - path: "workspace/retry-test.txt"
      content: "secret content"
input: "读取 workspace/retry-test.txt"
expected:
  tools:
    required: ["read_file"]
  output:
    must_contain: ["secret content"]
  max:
    tool_calls: 3  # 允许重试
scoring:
  mode: deduction
  max_score: 100
  pass_threshold: 80
notes: >
  测试失败恢复能力：工具失败后应重试而非放弃。
  TODO: 当前 fixture 机制无法注入"前 N 次失败"的故障，此用例暂只覆盖普通读取；
  待支持 fault-injection fixture（如 fail_times: 2）后再恢复 error_recovery 断言。
