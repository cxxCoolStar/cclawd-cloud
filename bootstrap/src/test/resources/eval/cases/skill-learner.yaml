id: skill-learner
name: Skill - OpenAgent Skill学习器触发
category: skill
priority: P2
fixtures:
  files:
    - path: "conversation.txt"
      content: |
        User: 帮我设置一个新的 React 项目
        Agent: 好的，我来帮你创建 React 项目结构
        Agent: [创建 package.json]
        Agent: [安装依赖]
        Agent: [创建 src/App.jsx]
        Agent: [配置 Vite]
        User: 太好了，再帮我添加 ESLint 和 Prettier
        Agent: [配置 ESLint]
        Agent: [配置 Prettier]
        Agent: [创建配置文件]
  skills:
    - name: "skill-learner"
      trigger: "Analyze conversations to extract reusable skill patterns"
      content: |
        Read the conversation source before analysis.
        Identify repeated, generalizable steps as a reusable workflow.
        State whether it should become a skill, give it a short name, and summarize
        inputs, ordered steps, and expected outputs. Do not create files unless asked.
input: "请分析 conversation.txt 中的对话，看看是否包含可以提取为 skill 的可复用工作流"
expected:
  tools:
    required: ["load_skill", "read_file"]
  output:
    must_contain: ["skill", "工作流", "React"]
  max:
    tool_calls: 3
    latency_ms: 20000
scoring:
  mode: deduction
  max_score: 100
  pass_threshold: 80
  result_incorrect_penalty: 100
  process_violation_penalty: 10
notes: "验证模型加载 skill-learner、读取对话并提取 React 项目初始化工作流"
