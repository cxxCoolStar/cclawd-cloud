id: skill-code-runner
name: Skill - 代码执行器触发
category: skill
priority: P1
fixtures:
  skills:
    - name: "code-runner"
      trigger: "Execute code in multiple programming languages"
      content: |
        For requests that ask to run a short program, call exec with an inline command.
        Do not create a source file unless the user explicitly requests one.
        Report the program's stdout and briefly identify the calculation performed.
input: "帮我写一个 Python 程序计算 1 到 100 的和，并执行它"
expected:
  tools:
    required: ["load_skill", "exec"]
    forbidden: ["write_file", "edit_file"]
  output:
    must_contain: ["5050"]
    forbidden: ["错误", "失败", "exception"]
  max:
    tool_calls: 8
    latency_ms: 15000
scoring:
  mode: deduction
  max_score: 100
  pass_threshold: 80
  result_incorrect_penalty: 100
  process_violation_penalty: 10
notes: "验证模型先加载 code-runner skill，再以内联命令执行 Python，且不创建临时源文件"
