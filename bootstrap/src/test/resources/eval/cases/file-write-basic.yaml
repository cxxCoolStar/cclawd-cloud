id: file-write-basic
name: 创建新文件并写入内容
category: core_logic
priority: P0
input: "在 workspace/ 下创建一个 hello.txt 文件，内容为 'Hello World'"
expected:
  tools:
    required: ["write_file"]
    forbidden: ["exec"]
  outcome:
    file_exists: "workspace/hello.txt"
    file_content_contains: "Hello World"
  output:
    must_contain: ["hello.txt"]
    must_contain_any: ["创建", "成功", "写入"]  # 任一确认表达即可
  max:
    tool_calls: 1
    latency_ms: 5000
scoring:
  mode: deduction
  max_score: 100
  pass_threshold: 80
  result_incorrect_penalty: 100
notes: "测试文件写入能力，应直接使用 write_file 而非 exec echo"
