id: file-read-basic
name: 读取文件并总结内容
category: core_logic
priority: P0
input: "请读取 project/README.md 文件，并总结它的主要内容"
fixtures:
  files:
    - path: "project/README.md"
      content: |
        # 示例项目

        这是一个用于测试的示例项目。

        ## 项目介绍

        本项目展示了基本的文件读取能力测试。Agent 应该能够：
        1. 定位到正确的文件路径
        2. 读取文件内容
        3. 总结主要内容

        ## 使用说明

        请勿修改此文件，仅用于测试读取操作。
expected:
  tools:
    required: ["read_file"]
    forbidden: ["write_file", "edit_file", "exec"]
  output:
    must_contain: ["README", "项目", "总结"]  # 允许语义相近的表达
    forbidden: ["错误", "无法读取", "找不到"]
  max:
    tool_calls: 2
    latency_ms: 8000
scoring:
  mode: deduction
  max_score: 100
  pass_threshold: 80
  result_incorrect_penalty: 100
  process_violation_penalty: 10
notes: "测试最基本的文件读取能力，不应触发编辑或执行工具"
