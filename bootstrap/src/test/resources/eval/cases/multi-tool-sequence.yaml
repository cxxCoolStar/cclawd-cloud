id: multi-tool-sequence
name: 多工具调用序列
category: core_logic
priority: P0
fixtures:
  files:
    - path: "workspace/data/users.csv"
      content: "name,age\nAlice,25\nBob,30\n"
input: "读取 workspace/data/users.csv，计算平均年龄，把结果写入 workspace/output/avg.txt"
expected:
  tools:
    required: ["read_file", "write_file"]
    ordered: true
  outcome:
    file_exists: "workspace/output/avg.txt"
    file_content_contains: "27.5"  # (25+30)/2
  max:
    tool_calls: 3
scoring:
  mode: deduction
  max_score: 100
  pass_threshold: 80
  result_incorrect_penalty: 100
notes: "测试多步骤推理和工具序列：读取→计算→写入"
