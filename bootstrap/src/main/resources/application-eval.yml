# Eval Profile: 独立的 Eval 测试配置
# 使用时: -Dspring.profiles.active=eval
#
# 注意：Eval 测试使用真实 LLM 调用（从主配置继承）
# 需要环境变量: OPENAGENT_MODEL_API_KEY, OPENAGENT_MODEL_API_BASE, OPENAGENT_MODEL

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  datasource:
    # Eval 使用内存数据库，完全隔离
    url: jdbc:sqlite:file::memory:?cache=shared
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  sql:
    init:
      mode: never

openagent:
  model:
    provider: ${OPENAGENT_MODEL_PROVIDER:openai-compatible}
    api-base: ${OPENAGENT_MODEL_API_BASE:https://api.lkeap.cloud.tencent.com/coding/v3}
    api-key: ${OPENAGENT_MODEL_API_KEY:}
    name: ${OPENAGENT_MODEL:k2.5}

  sandbox:
    docker-enabled: true

  tools:
    workspace-root: ${java.io.tmpdir}/openagent-eval-workspaces
    web-fetch-enabled: true

  memory:
    # Eval 模式下使用独立的 workspace 根目录，避免覆盖真实 agent 的 MEMORY.md
    eval-workspace-root: ${java.io.tmpdir}/openagent-eval-workspaces/memory
  eval:
    # Scale model-agnostic case budgets to the observed kimi-k2.5 latency.
    latency-budget-multiplier: ${OPENAGENT_EVAL_LATENCY_MULTIPLIER:8.0}
    # 测试用例路径（classpath 下的 eval/cases）
    cases:
      path: classpath:eval/cases
    # 临时工作空间根目录（使用系统临时目录）
    workspace-root: ${java.io.tmpdir}/openagent-eval-workspaces
    # 运行结束后是否清理工作空间
    cleanup-on-finish: true

# 日志配置
logging:
  level:
    ai.openagent.bootstrap.eval: DEBUG
    ai.openagent.agent.eval: DEBUG
