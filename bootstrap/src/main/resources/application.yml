server:
  address: ${OPENAGENT_BIND:127.0.0.1}
  port: ${OPENAGENT_PORT:18953}
  shutdown: graceful

spring:
  application:
    name: openagent
  config:
    import: optional:file:.env[.properties]
  servlet:
    multipart:
      max-file-size: ${OPENAGENT_UPLOAD_MAX_FILE_SIZE:64MB}
      max-request-size: ${OPENAGENT_UPLOAD_MAX_REQUEST_SIZE:64MB}
  datasource:
    url: ${OPENAGENT_DATABASE_URL:jdbc:sqlite:openagent.db}
    username: ${OPENAGENT_DATABASE_USERNAME:}
    password: ${OPENAGENT_DATABASE_PASSWORD:}
    hikari:
      maximum-pool-size: ${OPENAGENT_DATABASE_POOL_SIZE:1}
      connection-timeout: 10000
  flyway:
    enabled: true
    locations: classpath:db/migration
  lifecycle:
    timeout-per-shutdown-phase: 20s

openagent:
  version: ${OPENAGENT_VERSION:0.1.0-SNAPSHOT}
  registration-open: ${OPENAGENT_REGISTRATION_OPEN:false}
  model:
    provider: ${OPENAGENT_MODEL_PROVIDER:openai}
    api-base: ${OPENAGENT_MODEL_API_BASE:https://api.openai.com/v1}
    api-key: ${OPENAGENT_MODEL_API_KEY:}
    name: ${OPENAGENT_MODEL:gpt-4.1-mini}
    temperature: ${OPENAGENT_MODEL_TEMPERATURE:0.7}
    max-tokens: ${OPENAGENT_MODEL_MAX_TOKENS:2048}
    system-prompt: ${OPENAGENT_SYSTEM_PROMPT:You are OpenAgent, a helpful AI assistant.}
  sandbox:
    docker-enabled: ${OPENAGENT_SANDBOX_DOCKER_ENABLED:false}
    image: ${OPENAGENT_SANDBOX_IMAGE:python:3.12-slim}
    cpus: ${OPENAGENT_SANDBOX_CPUS:1}
    memory: ${OPENAGENT_SANDBOX_MEMORY:512m}
    network: ${OPENAGENT_SANDBOX_NETWORK:bridge}
  agent:
    max-tool-iterations: ${OPENAGENT_AGENT_MAX_TOOL_ITERATIONS:8}
    run-timeout: ${OPENAGENT_AGENT_RUN_TIMEOUT:10m}
    context-token-threshold: ${OPENAGENT_CONTEXT_TOKEN_THRESHOLD:80000}
    context-prune-turn-age: ${OPENAGENT_CONTEXT_PRUNE_TURN_AGE:20}
    context-summary-max-tokens: ${OPENAGENT_CONTEXT_SUMMARY_MAX_TOKENS:2048}
  memory:
    enabled: ${OPENAGENT_MEMORY_ENABLED:true}
    auto-persist-enabled: ${OPENAGENT_MEMORY_AUTO_PERSIST_ENABLED:true}
    auto-persist-interval: ${OPENAGENT_MEMORY_AUTO_PERSIST_INTERVAL:5}
    max-file-chars: ${OPENAGENT_MEMORY_MAX_FILE_CHARS:32768}
  skills:
    dir: ${OPENAGENT_SKILLS_DIR:./skills}
  tools:
    execution-timeout: ${OPENAGENT_TOOL_TIMEOUT:30s}
    max-result-chars: ${OPENAGENT_TOOL_MAX_RESULT_CHARS:65536}
    workspace-root: ${OPENAGENT_WORKSPACE_ROOT:./workspace}
    read-file-max-bytes: ${OPENAGENT_READ_FILE_MAX_BYTES:1048576}
    web-fetch-enabled: ${OPENAGENT_WEB_FETCH_ENABLED:false}
    web-fetch-max-bytes: ${OPENAGENT_WEB_FETCH_MAX_BYTES:1048576}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

