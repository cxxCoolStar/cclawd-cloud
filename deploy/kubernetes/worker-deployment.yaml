apiVersion: apps/v1
kind: Deployment
metadata:
  name: openagent-channel-worker
  labels:
    app.kubernetes.io/name: openagent
    app.kubernetes.io/component: channel-worker
spec:
  replicas: 2
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openagent
      app.kubernetes.io/component: channel-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openagent
        app.kubernetes.io/component: channel-worker
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: openagent
          image: openagent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 18953
          envFrom:
            - configMapRef:
                name: openagent-channel-config
            - secretRef:
                name: openagent-channel-secrets
          env:
            - name: OPENAGENT_CHANNEL_ROLES
              value: agent-worker
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 768Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: workspace
              mountPath: /app/workspace
      volumes:
        - name: tmp
          emptyDir: {}
        - name: workspace
          emptyDir: {}
